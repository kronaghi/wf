name: Build docs

on:
  push:
    branches: [main]

# Allow the workflow to commit the regenerated docs/ back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing to push docs/.
concurrency:
  group: build-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render static page
        run: python scripts/build_static.py

      - name: Commit docs/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll
          if git diff --staged --quiet; then
            echo "docs/ already up to date — nothing to commit."
          else
            git commit -m "ci: rebuild docs/ from index view [skip ci]"
            git push
          fi
